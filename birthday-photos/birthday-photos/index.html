<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Hetvi</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Nunito', sans-serif; 
            background: linear-gradient(135deg, #F8F8FF 0%, #E6E6FA 100%);
            min-height: 100vh; 
            overflow-x: hidden;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .section { 
            min-height: 100vh; 
            display: none; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
            padding: 40px 20px;
        }
        .section.active { display: flex; }
        .heading { 
            font-family: 'Baloo 2', cursive; 
            font-size: 48px; 
            font-weight: 700; 
            color: #FF69B4; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-bottom: 40px;
        }
        .btn { 
            background: linear-gradient(45deg, #87CEFA, #4682B4); 
            color: white; 
            border: none; 
            padding: 15px 40px; 
            font-size: 18px; 
            font-weight: 700; 
            border-radius: 50px; 
            cursor: pointer; 
            margin: 20px; 
            transition: transform 0.3s;
        }
        .btn:hover { transform: scale(1.05); }
        .gift-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 30px; 
            max-width: 500px; 
            margin: 40px 0;
        }
        .gift-box { 
            width: 150px; 
            height: 150px; 
            background: linear-gradient(45deg, #FFB6C1, #FF69B4); 
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 60px; 
            cursor: pointer; 
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(255,182,193,0.4);
        }
        .gift-box:hover { transform: scale(1.1) rotate(5deg); }
        .photo-container { 
            max-width: 400px; 
            max-height: 300px; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin: 20px 0;
        }
        .photo-container img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        .modal { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.8); 
            display: none; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            max-width: 500px; 
            text-align: center; 
            max-height: 80vh; 
            overflow-y: auto;
        }
        @media (max-width: 768px) {
            .heading { font-size: 32px; }
            .gift-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Section 1: Welcome -->
        <section id="sec1" class="section active">
            <h1 class="heading">HAPPY BIRTHDAY HETVI!</h1>
            <div style="font-size: 80px; margin: 40px 0;">🎂🐻🎁🐰🐱</div>
            <button class="btn" onclick="nextSection(2)">NEXT →</button>
        </section>

        <!-- Section 2: Gifts -->
        <section id="sec2" class="section">
            <h1 class="heading" style="color: #222;">GIFT FOR YOU</h1>
            <div class="gift-grid">
                <div class="gift-box" onclick="openGift(0)">🎁</div>
                <div class="gift-box" onclick="openGift(1)">🎁</div>
                <div class="gift-box" onclick="openGift(2)">🎁</div>
                <div class="gift-box" onclick="openGift(3)">🎁</div>
            </div>
            <p style="color: #666; font-size: 18px; margin-top: 20px;">Click any gift to open!</p>
        </section>

        <!-- Section 3: Final -->
        <section id="sec3" class="section">
            <h1 class="heading" style="color: #1E90FF;">I Love You The Mostest!</h1>
            <div style="font-size: 100px; margin: 40px 0;">💕🐱💐</div>
            <p style="font-size: 24px; color: #222; margin: 20px 0;">Thank you for being amazing!</p>
            <button class="btn" onclick="restart()">REPLAY 🎉</button>
        </section>
    </div>

    <!-- Gift Modal -->
    <div id="giftModal" class="modal">
        <div class="modal-content">
            <div id="giftEmoji" style="font-size: 80px; margin-bottom: 20px;"></div>
            <div id="giftPhoto" class="photo-container" style="display: none;"></div>
            <h2 id="giftTitle" style="color: #FF69B4; font-size: 28px; margin: 20px 0;"></h2>
            <p id="giftText" style="font-size: 18px; line-height: 1.6; color: #333;"></p>
            <button class="btn" onclick="closeGift()" style="margin-top: 30px;">NEXT GIFT</button>
        </div>
    </div>

    <script>
        let currentSection = 1;
        const gifts = [
            {
                emoji: "🎂",
                title: "A Year of Joy!",
                text: "Be happy and always stay healthy! Don't forget to eat on time 💕",
                image: "images/photo1.jpg"
            },
            {
                emoji: "🌟",
                title: "You're a Star!",
                text: "Keep shining bright! The world needs your light ✨",
                image: "images/photo2.jpg"
            },
            {
                emoji: "💝",
                title: "Lots of Love!",
                text: "Sending you all my love and warm hugs! Love you forever ❤️",
                image: "images/photo3.jpg"
            },
            {
                emoji: "🎉",
                title: "Party Time!",
                text: "Celebrate like there's no tomorrow! You're amazing! 🥳",
                image: "images/photo4.jpg"
            }
        ];

        function nextSection(num) {
            document.getElementById('sec' + currentSection).classList.remove('active');
            currentSection = num;
            document.getElementById('sec' + currentSection).classList.add('active');
        }

        function openGift(index) {
            const gift = gifts[index];
            document.getElementById('giftEmoji').textContent = gift.emoji;
            document.getElementById('giftTitle').textContent = gift.title;
            document.getElementById('giftText').textContent = gift.text;
            
            // Load image
            const photoDiv = document.getElementById('giftPhoto');
            const img = photoDiv.querySelector('img') || document.createElement('img');
            img.src = gift.image;
            img.onerror = function() { photoDiv.style.display = 'none'; };
            img.onload = function() { photoDiv.style.display = 'block'; };
            photoDiv.innerHTML = '';
            photoDiv.appendChild(img);
            
            document.getElementById('giftModal').classList.add('active');
        }

        function closeGift() {
            document.getElementById('giftModal').classList.remove('active');
        }

        function restart() {
            nextSection(1);
        }

        // Close modal on outside click
        document.getElementById('giftModal').addEventListener('click', function(e) {
            if (e.target === this) closeGift();
        });
    </script>
</body>
</html>
